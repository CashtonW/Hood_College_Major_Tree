<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Hood College | Academic Major Dependency Trees</title>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; overflow: hidden; }
        .node { cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>
</head>
<body>

    <header class="hood-header">
        <div class="header-content">
            <div class="hood-logo-text">HOOD COLLEGE</div>
            <div class="header-divider"></div>
            <h1>Academic Major Dependency Trees</h1>
        </div>
    </header>

    <div class="controls-panel">
        <div class="left-controls">
            <div class="control-group">
                <label for="categoryFilter">Select View:</label>
                <select id="categoryFilter">
                    <option value="HOME">Home (No Graph)</option>
                </select>
            </div>
            
            <div class="control-group search-group" id="searchWrapper" style="display: none;">
                <label for="courseSearchInput">Find Course:</label>
                <div class="search-input-container">
                    <input type="text" id="courseSearchInput" placeholder="e.g. CHEM 102" autocomplete="off">
                    <button id="courseSearchBtn">Search</button>
                </div>
                <span id="searchFeedbackMessage" class="search-feedback"></span>
            </div>

            <div class="control-group transcript-group" id="transcriptWrapper" style="display: none;">
                <label class="transcript-upload-label" for="transcriptFileInput">Import Transcript</label>
                <input type="file" id="transcriptFileInput" accept="application/pdf" style="display: none;">
            </div>

            <button id="clearAllBtn" class="clear-selection-btn" style="display: none;">Clear All</button>
        </div>
        
        <div class="top-progress-container" id="topProgressWrapper" style="display: none;">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="checklistProgressFill" style="width: 0%;"></div>
            </div>
            <div class="progress-text" id="checklistProgressText">0 / 0 Completed</div>
        </div>
    </div>

    <div class="app-layout">
        <div class="viewport">
            <div id="graph-container"></div>
        </div>
    </div>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'neutral',
            securityLevel: 'loose',
            flowchart: { rankSpacing: 140, nodeSpacing: 65 }
        });

        let cachedData = null;
        let activeGraphNodeIds = [];
        let currentSelectionMode = "HOME";
        let completedNodesTracker = new Set();
        let currentDependencyMap = {}; 

        async function initializeApp() {
            try {
                const response = await fetch('tree_structure.json');
                cachedData = await response.json();
                
                const selectElement = document.getElementById('categoryFilter');
                
                Object.keys(cachedData).forEach(key => {
                    if (cachedData[key] && cachedData[key].program) {
                        const option = document.createElement('option');
                        option.value = key;
                        option.textContent = cachedData[key].program;
                        selectElement.appendChild(option);
                    }
                });
            } catch (error) {
                console.error("Error parsing major data configuration:", error);
                document.getElementById('graph-container').innerHTML = '<p style="color: #d9534f; text-align: center; margin-top: 20px; font-weight: bold;">Failed to load course data. Please ensure tree_structure.json is formatted correctly.</p>';
            }
        }

        function setupActiveCourseIds(selection) {
            activeGraphNodeIds = [];
            completedNodesTracker.clear();
            currentSelectionMode = selection;

            const progressWrapper = document.getElementById('topProgressWrapper');
            const searchWrapper = document.getElementById('searchWrapper');
            const transcriptWrapper = document.getElementById('transcriptWrapper');
            const clearBtn = document.getElementById('clearAllBtn');
            clearSearchEngine();
            
            if (selection === 'HOME' || !cachedData || !cachedData[selection] || !cachedData[selection].requirements) {
                progressWrapper.style.display = 'none';
                searchWrapper.style.display = 'none';
                transcriptWrapper.style.display = 'none';
                clearBtn.style.display = 'none';
                updateProgressMetrics();
                return;
            }

            progressWrapper.style.display = 'flex';
            searchWrapper.style.display = 'flex';
            transcriptWrapper.style.display = 'flex';
            clearBtn.style.display = 'inline-block';
            const segments = cachedData[selection].requirements;

            Object.keys(segments).forEach(groupTitle => {
                const courseList = segments[groupTitle] || [];
                courseList.forEach(course => {
                    if (!course || !course.code) return;
                    const cleanId = course.code.replace(/\s/g, '_');
                    if (!activeGraphNodeIds.includes(cleanId)) {
                        activeGraphNodeIds.push(cleanId);
                    }
                });
            });

            updateProgressMetrics();
        }

        function updateProgressMetrics() {
            if (activeGraphNodeIds.length === 0 || currentSelectionMode === 'HOME') {
                document.getElementById('checklistProgressFill').style.width = '0%';
                document.getElementById('checklistProgressText').textContent = '0 / 0 Completed (0%)';
                return;
            }

            let checkedCount = completedNodesTracker.size;
            const percentage = Math.round((checkedCount / activeGraphNodeIds.length) * 100);
            document.getElementById('checklistProgressFill').style.width = `${percentage}%`;
            document.getElementById('checklistProgressText').textContent = `${checkedCount} / ${activeGraphNodeIds.length} Passed (${percentage}%)`;
        }

        function clearSearchEngine() {
            const inputField = document.getElementById('courseSearchInput');
            const feedbackText = document.getElementById('searchFeedbackMessage');
            if (inputField) inputField.value = '';
            if (feedbackText) feedbackText.textContent = '';
        }

        function handleClearAllSelections() {
            completedNodesTracker.clear();

            const nodeElements = document.querySelectorAll('.node');
            nodeElements.forEach(node => {
                node.classList.remove('selected-node');
                node.classList.remove('prereqs-met');
            });

            const paths = document.querySelectorAll('.edgePath path');
            paths.forEach(path => {
                path.classList.remove('selected-edge');
            });

            updateProgressMetrics();
            clearSearchEngine();
        }

        function handleCourseSearchExecution() {
            const feedbackText = document.getElementById('searchFeedbackMessage');
            feedbackText.textContent = ''; 

            if (currentSelectionMode === 'HOME') return;

            const userInput = document.getElementById('courseSearchInput').value.trim();
            if (!userInput) {
                feedbackText.style.color = '#718096';
                feedbackText.textContent = 'Please enter a course code.';
                return;
            }

            const targetIdString = userInput.toUpperCase().replace(/\s/g, '_');

            const nodeElements = Array.from(document.querySelectorAll('.node'));
            const destinationDomNode = nodeElements.find(n => n.id.includes(`flowchart-${targetIdString}-`) || n.id === `flowchart-${targetIdString}`);

            if (destinationDomNode && typeof window.mermaidNodeClick === 'function') {
                destinationDomNode.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                window.mermaidNodeClick(targetIdString);
            } else {
                feedbackText.style.color = '#e53e3e';
                feedbackText.textContent = 'Course is not a major requirement.';
            }
        }

        async function handleTranscriptUpload(event) {
            const file = event.target.files[0];
            if (!file || currentSelectionMode === 'HOME') return;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullExtractedText = '';

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' \n ');
                    fullExtractedText += pageText + '\n';
                }

                const courseRegex = /([A-Z]{2,4})\s+(\d{3}[A-Z]?)/g;
                let matchedRecords = [];
                let match;

                while ((match = courseRegex.exec(fullExtractedText)) !== null) {
                    const cleanCode = `${match[1]}_${match[2]}`;
                    if (!matchedRecords.includes(cleanCode)) {
                        matchedRecords.push(cleanCode);
                    }
                }

                handleClearAllSelections();

                matchedRecords.forEach(cleanId => {
                    if (activeGraphNodeIds.includes(cleanId)) {
                        const nodeElements = Array.from(document.querySelectorAll('.node'));
                        const actualDomNode = nodeElements.find(n => n.id.includes(`flowchart-${cleanId}-`) || n.id === `flowchart-${cleanId}`);
                        
                        if (actualDomNode && !actualDomNode.classList.contains('selected-node')) {
                            if (typeof window.mermaidNodeClick === 'function') {
                                window.mermaidNodeClick(cleanId);
                            }
                        }
                    }
                });

            } catch (error) {
                console.error("Transcript Parsing Error:", error);
            }
        }

        async function updateView(selection) {
            const container = document.getElementById('graph-container');
            if (selection === 'HOME') {
                container.innerHTML = `
                    <div style="text-align: center; margin-top: 100px; color: #666666;">
                        <h2 style="color: #003366; font-size: 28px; margin-bottom: 10px;">Welcome to the Academic Major Dependency System</h2>
                        <p style="font-size: 16px;">Please select an undergraduate program from the menu above to map out structural prerequisites.</p>
                    </div>
                `;
                setupActiveCourseIds('HOME');
                return;
            }

            if (!cachedData) {
                await initializeApp();
            }

            setupActiveCourseIds(selection);

            currentDependencyMap = {}; 
            let graphDefinition = 'graph TD;\n'; 
            let currentViewNodeTitles = {};
            
            let targetCourses = [];
            const segments = cachedData[selection]?.requirements || {}; 
            
            Object.keys(segments).forEach(key => {
                if (Array.isArray(segments[key])) {
                    targetCourses = targetCourses.concat(segments[key]);
                }
            });

            if (targetCourses.length === 0) {
                container.innerHTML = '<p style="text-align: center; margin-top: 20px; color: #666666;">No courses found for this program.</p>';
                return;
            }

            targetCourses.forEach(course => {
                if (course && course.code) {
                    const id = course.code.replace(/\s/g, '_');
                    currentViewNodeTitles[id] = `${course.code}<br/>${course.name || 'Elective'}`;
                }
            });

            targetCourses.forEach(course => {
                if (!course || !course.code) return;
                const id = course.code.replace(/\s/g, '_');
                if (!currentDependencyMap[id]) currentDependencyMap[id] = [];
                
                if (course.prerequisites && Array.isArray(course.prerequisites)) {
                    course.prerequisites.forEach(pre => {
                        if (!pre || !pre.id) return;
                        const preId = pre.id.replace(/\s/g, '_');
                        currentDependencyMap[id].push(preId);
                        
                        if (!currentViewNodeTitles[preId]) {
                            currentViewNodeTitles[preId] = pre.id;
                        }
                    });
                }
            });

            Object.keys(currentViewNodeTitles).forEach(id => {
                graphDefinition += `  ${id}["${currentViewNodeTitles[id]}"];\n`;
            });

            Object.keys(currentDependencyMap).forEach(id => {
                currentDependencyMap[id].forEach(parentId => {
                    graphDefinition += `  ${parentId} --> ${id};\n`;
                });
            });

            graphDefinition += `\n`;
            Object.keys(currentViewNodeTitles).forEach(id => {
                graphDefinition += `  click ${id} call mermaidNodeClick("${id}");\n`;
            });

            window.mermaidNodeClick = function(nodeId) {
                const nodeElements = Array.from(document.querySelectorAll('.node'));
                const targetNode = nodeElements.find(n => n.id.includes(nodeId));
                if (!targetNode) return;

                const willBeActive = !targetNode.classList.contains('selected-node');
                function findDomNode(id) { return nodeElements.find(n => n.id.includes(id)); }

                if (willBeActive) {
                    function highlightAncestors(id) {
                        const node = findDomNode(id);
                        if (node) node.classList.add('selected-node');
                        completedNodesTracker.add(id);

                        if (currentDependencyMap[id]) {
                            currentDependencyMap[id].forEach(parentId => {
                                highlightAncestors(parentId);
                                const edges = document.querySelectorAll('.edgePath');
                                edges.forEach(edge => {
                                    const classes = edge.className.baseVal || edge.className;
                                    if (classes.includes(`ls-${parentId}`) && classes.includes(`le-${id}`)) {
                                        const pathElement = edge.querySelector('path');
                                        if (pathElement) pathElement.classList.add('selected-edge');
                                    }
                                });
                            });
                        }
                    }
                    highlightAncestors(nodeId);
                } else {
                    targetNode.classList.remove('selected-node');
                    completedNodesTracker.delete(nodeId);
                    
                    if (currentDependencyMap[nodeId]) {
                        currentDependencyMap[nodeId].forEach(parentId => {
                            const edges = document.querySelectorAll('.edgePath');
                            edges.forEach(edge => {
                                const classes = edge.className.baseVal || edge.className;
                                if (classes.includes(`ls-${parentId}`) && classes.includes(`le-${nodeId}`)) {
                                    const pathElement = edge.querySelector('path');
                                    if (pathElement) pathElement.classList.remove('selected-edge');
                                }
                            });
                        });
                    }

                    function unhighlightDescendants(parentId) {
                        Object.keys(currentDependencyMap).forEach(childId => {
                            if (currentDependencyMap[childId].includes(parentId)) {
                                const childNode = findDomNode(childId);
                                if (childNode && childNode.classList.contains('selected-node')) {
                                    childNode.classList.remove('selected-node');
                                    completedNodesTracker.delete(childId);

                                    const edges = document.querySelectorAll('.edgePath');
                                    edges.forEach(edge => {
                                        const classes = edge.className.baseVal || edge.className;
                                        if (classes.includes(`ls-${parentId}`) && classes.includes(`le-${childId}`)) {
                                            const pathElement = edge.querySelector('path');
                                            if (pathElement) pathElement.classList.remove('selected-edge');
                                        }
                                    });
                                    unhighlightDescendants(childId);
                                }
                            }
                        });
                    }
                    unhighlightDescendants(nodeId);
                }

                Object.keys(currentDependencyMap).forEach(childId => {
                    const childDomNode = findDomNode(childId);
                    if (!childDomNode) return;

                    const parentIds = currentDependencyMap[childId];
                    if (parentIds.length === 0) return;

                    const allParentsHighlighted = parentIds.every(parentId => {
                        const parentDomNode = findDomNode(parentId);
                        return parentDomNode && parentDomNode.classList.contains('selected-node');
                    });

                    if (allParentsHighlighted) {
                        childDomNode.classList.add('prereqs-met');
                    } else {
                        childDomNode.classList.remove('prereqs-met');
                    }
                });

                updateProgressMetrics();
            };

            try {
                container.innerHTML = `<div class="mermaid" id="graph-engine">${graphDefinition}</div>`;
                const element = document.getElementById('graph-engine');
                await mermaid.run({ nodes: [element] });
            } catch (renderError) {
                console.error("Mermaid Render Error:", renderError);
                container.innerHTML = '<p style="color: #003366; font-weight: bold; padding: 20px;">Error drawing the dynamic chart. Verify structural constraints.</p>';
            }
        }

        const filterSelect = document.getElementById('categoryFilter');
        filterSelect.addEventListener('change', (e) => {
            updateView(e.target.value);
        });

        document.getElementById('courseSearchBtn').addEventListener('click', handleCourseSearchExecution);
        document.getElementById('courseSearchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleCourseSearchExecution();
        });

        document.getElementById('clearAllBtn').addEventListener('click', handleClearAllSelections);
        document.getElementById('transcriptFileInput').addEventListener('change', handleTranscriptUpload);
        
        (async () => {
            await initializeApp();
            updateView('HOME');
        })();
        
    </script>
</body>
</html>

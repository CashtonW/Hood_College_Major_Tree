<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="stylesheet" href="style.css">
    <title>Hood College | Academic Major Dependency Trees</title>
    <style>
        html, body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; overflow: hidden; height: 100%; transition: background-color 0.3s ease, color 0.3s ease; }
        .node { cursor: pointer; }
        #graph-zoom-wrapper { transform-origin: top left; display: inline-block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>
</head>
<body>

    <header class="hood-header">
        <div class="header-content">
            <div class="hood-logo-text">HOOD COLLEGE</div>
            <div class="header-divider"></div>
            <h1>Academic Major Dependency Trees</h1>
        </div>
    </header>

    <div class="controls-panel">
        <!-- NEW GLOBAL ACTIONS: Dark Mode & Menu Toggle -->
        <div class="global-actions" style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; flex-basis: 100%;">
            <button id="toggleMenuBtn" class="action-btn">Collapse Menu</button>
            <button id="darkModeBtn" class="action-btn">🌙 Dark Mode</button>
        </div>

        <!-- COLLAPSIBLE WRAPPER -->
        <div id="collapsibleMenu" style="display: flex; flex-wrap: wrap; width: 100%; align-items: center; justify-content: space-between; gap: 16px 30px;">
            <div class="left-controls">
                <div class="control-group">
                    <label for="categoryFilter">Select View:</label>
                    <select id="categoryFilter">
                        <option value="HOME">Home (No Graph)</option>
                    </select>
                    <!-- DOUBLE MAJOR: "+" button. Hidden on the HOME screen (nothing to add a
                         second major to yet); revealed once a primary major is chosen. Clicking
                         it reveals the second-major dropdown below. -->
                    <button id="addMajorBtn" class="add-major-btn" title="Add a second major (double major planner)" style="display: none;">+</button>
                </div>

                <!-- DOUBLE MAJOR: second-major picker. Stays hidden until the user presses
                     the "+" button above. Choosing a program here merges its requirements
                     into the same graph, and an "x" removes it again. -->
                <div class="control-group double-major-group" id="secondMajorWrapper" style="display: none;">
                    <label for="secondMajorFilter">Add Major:</label>
                    <select id="secondMajorFilter">
                        <option value="">-- Choose second major --</option>
                    </select>
                    <button id="removeSecondMajorBtn" class="remove-major-btn" title="Remove second major">&times;</button>
                </div>

                <div class="control-group search-group" id="searchWrapper" style="display: none;">
                    <label for="courseSearchInput">Find Course:</label>
                    <div class="search-input-container">
                        <input type="text" id="courseSearchInput" placeholder="e.g. CHEM 102" autocomplete="off">
                        <button id="courseSearchBtn">Search</button>
                    </div>
                    <span id="searchFeedbackMessage" class="search-feedback"></span>
                </div>

                <div class="control-group transcript-group" id="transcriptWrapper" style="display: none;">
                    <label class="transcript-upload-label" for="transcriptFileInput">Import Transcript</label>
                    <input type="file" id="transcriptFileInput" accept="application/pdf" style="display: none;">
                </div>

                <!-- COURSE RECOMMENDER: opens a panel suggesting 3-5 courses to take next,
                     based on prerequisites met, the current time of year, and how rarely a
                     course is offered (see computeRecommendations() in the script below). -->
                <button id="recommendBtn" class="recommend-btn" style="display: none;">Recommend Courses</button>

                <button id="clearAllBtn" class="clear-selection-btn" style="display: none;">Clear All</button>
            </div>
            
            <div class="top-progress-container" id="topProgressWrapper" style="display: none;">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="checklistProgressFill" style="width: 0%;"></div>
                </div>
                <div class="progress-text" id="checklistProgressText">0 / 0 Completed</div>
            </div>
        </div>
    </div>

    <!-- COURSE RECOMMENDER: modal overlay populated dynamically by
         showRecommendationPanel() in the script. Hidden until the user
         clicks "Recommend Courses". -->
    <div class="recommend-overlay" id="recommendOverlay" style="display: none;">
        <div class="recommend-modal">
            <div class="recommend-modal-header">
                <h3>Recommended Courses</h3>
                <button id="closeRecommendBtn" class="recommend-close-btn" aria-label="Close">&times;</button>
            </div>
            <p class="recommend-modal-subtitle" id="recommendSubtitle"></p>
            <div id="recommendResultsList" class="recommend-results-list"></div>
        </div>
    </div>

    <div class="app-layout">
        <div class="viewport" id="viewport">
            <div id="graph-zoom-wrapper">
                <div id="graph-container"></div>
            </div>
        </div>
        <div class="zoom-controls" id="zoomControls" style="display: none;">
            <button id="zoomInBtn" title="Zoom in" aria-label="Zoom in">+</button>
            <span id="zoomLevelLabel">100%</span>
            <button id="zoomOutBtn" title="Zoom out" aria-label="Zoom out">&minus;</button>
            <button id="zoomFitBtn" title="Fit whole chart to screen">Fit</button>
            <button id="zoomResetBtn" title="Reset zoom to 100%">Reset</button>
        </div>
    </div>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

        mermaid.initialize({
            startOnLoad: false,
            theme: 'neutral',
            securityLevel: 'loose',
            themeVariables: { fontSize: '16px' },
            flowchart: {
                useMaxWidth: false,   // Render graphs at their natural size instead of
                                      // squeezing large trees to fit the viewport width
                htmlLabels: true,
                rankSpacing: 140,
                nodeSpacing: 70
            }
        });

        // =================================================================
        // GLOBAL APPLICATION STATE
        // =================================================================
        let cachedData = null;                 // Full parsed tree_structure.json
        let activeGraphNodeIds = [];            // Every course id relevant to the CURRENT view (used for the progress bar denominator)
        let currentSelectionMode = "HOME";       // Primary major key (or "HOME")
        let secondMajorKey = null;               // DOUBLE MAJOR: second major key, or null if not double-majoring
        let completedNodesTracker = new Set();  // Course ids the student has marked "passed"
        let currentDependencyMap = {};           // courseId -> [prerequisite course ids]
        let currentDependencyTypes = {};         // courseId -> { prerequisiteId: "required" | "corequisite" | "alternative_dotted" }
        let currentCourseMeta = {};              // courseId -> {name, availability, ...} for every node currently on screen (used by the recommender)
        window.triggerReRender = null;           // Global hook for re-rendering layouts

        // LAYOUT ENGINE: when true, the next successful render will automatically scale
        // the graph to fit the visible viewport (see autoFitGraphZoomToViewport()).
        // Set whenever the active course-set changes size (new major, double-major
        // added/removed) so a fresh graph never opens cut off or over-scrolled -
        // especially important for majors with 30-60+ courses on a mobile screen.
        let pendingAutoFitZoom = false;

        // DOUBLE MAJOR: tracks which selected major(s) each currently-displayed course
        // belongs to, so shared/overlapping requirements can be visually flagged.
        // Values are Sets containing 'primary' and/or 'secondary'.
        let courseMajorMembership = {};

        // -----------------------------------------------------------------
        // MERMAID-SAFE ID SANITIZATION
        // -----------------------------------------------------------------
        // Root cause of the "Error drawing the dynamic chart" bug on the English
        // major page: several course keys in tree_structure.json contained spaces,
        // hyphens, "#", or "." (e.g. "200-level English course", "ENGL_270-289").
        // Mermaid flowchart node ids must be simple alphanumeric/underscore tokens;
        // anything else breaks the parser and mermaid.run() throws, which is what
        // the catch block below was silently turning into that generic error message.
        //
        // The source data has been cleaned up directly in tree_structure.json, but
        // this sanitizer is kept as a defensive second layer so that any future typo
        // or copy-paste error in the data can never crash the whole graph again -
        // it will just render with a cleaned-up id instead of throwing.
        let idSafeMap = {};   // raw course key -> sanitized mermaid-safe id
        let idRawMap = {};    // sanitized mermaid-safe id -> raw course key

        function sanitizeMermaidId(rawId) {
            if (idSafeMap[rawId]) return idSafeMap[rawId];

            // Replace anything that isn't a letter/digit/underscore with "_"
            let safe = String(rawId).replace(/[^A-Za-z0-9_]/g, '_');
            // Mermaid ids can't start with a digit
            if (/^[0-9]/.test(safe)) safe = 'c_' + safe;

            // Guard against two different raw ids sanitizing to the same string
            let candidate = safe;
            let suffix = 2;
            while (idRawMap[candidate] && idRawMap[candidate] !== rawId) {
                candidate = `${safe}_${suffix}`;
                suffix += 1;
            }

            idSafeMap[rawId] = candidate;
            idRawMap[candidate] = rawId;
            return candidate;
        }

        // Builds the human-readable label for a node, e.g. "ENGL_270_289" -> "ENGL 270-289".
        // Only the FIRST underscore (the department/number separator) becomes a space;
        // any remaining underscores (used in multi-part course codes) become hyphens so
        // labels still read naturally instead of showing raw underscores.
        function formatCourseLabel(courseKey) {
            const idx = courseKey.indexOf('_');
            if (idx === -1) return courseKey;
            const dept = courseKey.slice(0, idx);
            const rest = courseKey.slice(idx + 1).replace(/_/g, '-');
            return `${dept} ${rest}`;
        }

        // =================================================================
        // APP INITIALIZATION
        // =================================================================
        async function initializeApp() {
            try {
                const response = await fetch('tree_structure.json');
                cachedData = await response.json();

                const selectElement = document.getElementById('categoryFilter');

                Object.keys(cachedData.programs).forEach(key => {
                    if (cachedData.programs[key] && cachedData.programs[key].program) {
                        const option = document.createElement('option');
                        option.value = key;
                        option.textContent = cachedData.programs[key].program;
                        selectElement.appendChild(option);
                    }
                });
            } catch (error) {
                console.error("Error parsing major data configuration:", error);
                document.getElementById('graph-container').innerHTML = '<p style="color: #d9534f; text-align: center; margin-top: 20px; font-weight: bold;">Failed to load course data. Please ensure tree_structure.json is formatted correctly.</p>';
            }
        }

        // Populates the "Add Major" second dropdown with every program except the one
        // already showing as the primary selection (a student can't double-major in the
        // same program twice).
        function populateSecondMajorOptions(excludeKey) {
            const secondSelect = document.getElementById('secondMajorFilter');
            secondSelect.innerHTML = '<option value="">-- Choose second major --</option>';

            Object.keys(cachedData.programs).forEach(key => {
                if (key === excludeKey) return;
                const prog = cachedData.programs[key];
                if (!prog || !prog.program) return;
                const option = document.createElement('option');
                option.value = key;
                option.textContent = prog.program;
                secondSelect.appendChild(option);
            });
        }

        function setupActiveCourseIds(selection) {
            activeGraphNodeIds = [];
            completedNodesTracker.clear();
            currentSelectionMode = selection;
            secondMajorKey = null; // Changing the primary major always resets any double-major pairing
            clearSearchEngine();

            const progressWrapper = document.getElementById('topProgressWrapper');
            const searchWrapper = document.getElementById('searchWrapper');
            const transcriptWrapper = document.getElementById('transcriptWrapper');
            const clearBtn = document.getElementById('clearAllBtn');
            const zoomControls = document.getElementById('zoomControls');
            const addMajorBtn = document.getElementById('addMajorBtn');
            const secondMajorWrapper = document.getElementById('secondMajorWrapper');
            const recommendBtn = document.getElementById('recommendBtn');

            // Second-major picker always collapses back down when the primary changes
            secondMajorWrapper.style.display = 'none';
            document.getElementById('secondMajorFilter').value = '';

            if (selection === 'HOME' || !cachedData || !cachedData.programs[selection] || !cachedData.programs[selection].requirements) {
                progressWrapper.style.display = 'none';
                searchWrapper.style.display = 'none';
                transcriptWrapper.style.display = 'none';
                clearBtn.style.display = 'none';
                zoomControls.style.display = 'none';
                addMajorBtn.style.display = 'none';
                recommendBtn.style.display = 'none';
                updateProgressMetrics();
                requestAnimationFrame(syncAppLayoutOffset);
                return;
            }

            progressWrapper.style.display = 'flex';
            searchWrapper.style.display = 'flex';
            transcriptWrapper.style.display = 'flex';
            clearBtn.style.display = 'inline-block';
            zoomControls.style.display = 'flex';
            addMajorBtn.style.display = 'inline-flex';       // DOUBLE MAJOR: reveal the "+" once a real major is picked
            recommendBtn.style.display = 'inline-block';     // RECOMMENDER: reveal once a real major is picked
            resetGraphZoom();
            pendingAutoFitZoom = true; // fit this newly-selected major's graph to the screen on first render
            requestAnimationFrame(syncAppLayoutOffset);

            collectActiveIdsForCurrentSelections();
            updateProgressMetrics();
        }

        // Gathers every course id needed for the progress bar denominator across
        // whichever major(s) are currently active (one, or two if double-majoring).
        function collectActiveIdsForCurrentSelections() {
            activeGraphNodeIds = [];
            [currentSelectionMode, secondMajorKey].forEach(progKey => {
                if (!progKey || !cachedData.programs[progKey]) return;
                const segments = cachedData.programs[progKey].requirements;
                Object.keys(segments).forEach(groupTitle => {
                    const courseKeysList = segments[groupTitle] || [];
                    courseKeysList.forEach(courseKey => {
                        if (!courseKey) return;
                        if (!activeGraphNodeIds.includes(courseKey)) {
                            activeGraphNodeIds.push(courseKey);
                        }
                    });
                });
            });
        }

        function updateProgressMetrics() {
            if (activeGraphNodeIds.length === 0 || currentSelectionMode === 'HOME') {
                document.getElementById('checklistProgressFill').style.width = '0%';
                document.getElementById('checklistProgressText').textContent = '0 / 0 Completed (0%)';
                return;
            }

            let checkedCount = completedNodesTracker.size;
            const percentage = Math.round((checkedCount / activeGraphNodeIds.length) * 100);
            document.getElementById('checklistProgressFill').style.width = `${percentage}%`;
            document.getElementById('checklistProgressText').textContent = `${checkedCount} / ${activeGraphNodeIds.length} Passed (${percentage}%)`;
        }

        function clearSearchEngine() {
            const inputField = document.getElementById('courseSearchInput');
            const feedbackText = document.getElementById('searchFeedbackMessage');
            if (inputField) inputField.value = '';
            if (feedbackText) feedbackText.textContent = '';
        }

        async function handleClearAllSelections(skipRenderFlag = false) {
            const shouldSkip = skipRenderFlag === true;
            completedNodesTracker.clear();
            updateProgressMetrics();
            clearSearchEngine();

            // Re-render the graph entirely to restore any nodes that were layout-shifted off screen
            if (!shouldSkip && window.triggerReRender && currentSelectionMode !== 'HOME') {
                await window.triggerReRender();
            } else {
                // Fallback state clear
                const nodeElements = document.querySelectorAll('.node');
                nodeElements.forEach(node => {
                    node.classList.remove('selected-node');
                    node.classList.remove('prereqs-met');
                });

                const paths = document.querySelectorAll('.edgePath path');
                paths.forEach(path => {
                    path.classList.remove('selected-edge');
                });
            }
        }

        function handleCourseSearchExecution() {
            const feedbackText = document.getElementById('searchFeedbackMessage');
            feedbackText.textContent = '';

            if (currentSelectionMode === 'HOME') return;

            const userInput = document.getElementById('courseSearchInput').value.trim();
            if (!userInput) {
                feedbackText.style.color = '#718096';
                feedbackText.textContent = 'Please enter a course code.';
                return;
            }

            const targetIdString = userInput.toUpperCase().replace(/\s/g, '_').replace('-', '_');
            const safeTarget = sanitizeMermaidId(targetIdString);
            const nodeElements = Array.from(document.querySelectorAll('.node'));
            const destinationDomNode = nodeElements.find(n => n.id.includes(`flowchart-${safeTarget}-`) || n.id === `flowchart-${safeTarget}`);

            // If node was isolated, clicked, and successfully removed from rendering
            if (!destinationDomNode && completedNodesTracker.has(targetIdString)) {
                feedbackText.style.color = '#38a169';
                feedbackText.textContent = 'Course is already completed and hidden.';
                return;
            }

            if (destinationDomNode && typeof window.mermaidNodeClick === 'function') {
                destinationDomNode.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                window.mermaidNodeClick(targetIdString);
            } else {
                feedbackText.style.color = '#e53e3e';
                feedbackText.textContent = 'Course is not a major requirement.';
            }
        }

        async function handleTranscriptUpload(event) {
            const file = event.target.files[0];
            if (!file || currentSelectionMode === 'HOME') return;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullExtractedText = '';

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const textContent = await page.getTextContent();
                    // Join with spaces to prevent breaking IDs that pdf.js reads on split lines
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullExtractedText += pageText + '\n';
                }

                // Robust parser: Handles CS 201, CS201, CS-201, BIOL 110-129, etc.
                const courseRegex = /([a-zA-Z]{2,6})[\s-]*(\d{3}(?:-\d{3})?[a-zA-Z]?)/g;
                let matchedRecords = [];
                let match;

                while ((match = courseRegex.exec(fullExtractedText)) !== null) {
                    const dept = match[1].toUpperCase();
                    const num = match[2].toUpperCase();
                    const cleanCode = `${dept}_${num}`;
                    if (!matchedRecords.includes(cleanCode)) {
                        matchedRecords.push(cleanCode);
                    }
                }

                // Clean the board silently to avoid Mermaid Engine Race Conditions
                await handleClearAllSelections(true);

                // Batch process data states
                matchedRecords.forEach(cleanId => {
                    if (activeGraphNodeIds.includes(cleanId) && !completedNodesTracker.has(cleanId)) {
                        if (typeof window.mermaidNodeClick === 'function') {
                            window.mermaidNodeClick(cleanId, true);
                        }
                    }
                });

                // Deploy a single re-render wipe to commit massive structural changes
                if (window.triggerReRender) {
                    await window.triggerReRender();
                }

            } catch (error) {
                console.error("Transcript Parsing Error:", error);
            } finally {
                // Flush the input so the same file can trigger 'onchange' again
                event.target.value = '';
            }
        }

        // =================================================================
        // MAIN VIEW / GRAPH BUILDING
        // =================================================================
        async function updateView(selection) {
            const container = document.getElementById('graph-container');
            if (selection === 'HOME') {
                container.innerHTML = `
                    <div style="text-align: center; margin-top: 100px; color: #666666;">
                        <h2 style="color: #003366; font-size: 28px; margin-bottom: 10px;">Welcome to the Academic Major Dependency System</h2>
                        <p style="font-size: 16px;">Please select an undergraduate program from the menu above to map out structural prerequisites.</p>
                    </div>

                    <!-- Dynamically Injected Complaint Panel -->
                    <div class="complaint-panel" style="margin-top: 40px; text-align: left;">
                        <h3>Submit a Complaint or Feedback</h3>
                        <p>Notice a broken prerequisite layout? Let us know.</p>

                        <form action="https://formspree.io/f/xdaqgwzq" method="POST">
                            <div class="form-group">
                                <label for="userEmail">Your Email (Optional):</label>
                                <input type="email" id="userEmail" name="email" placeholder="name@example.com">
                            </div>

                            <div class="form-group">
                                <label for="complaintText">Complaint / Feedback Details:</label>
                                <textarea id="complaintText" name="message" rows="4" placeholder="Describe the issue..." required></textarea>
                            </div>

                            <input type="text" name="_honey" style="display:none">

                            <button type="submit" class="submit-complaint-btn">Submit Form</button>
                        </form>
                    </div>
                `;
                setupActiveCourseIds('HOME');
                return;
            }

            if (!cachedData) {
                await initializeApp();
            }

            setupActiveCourseIds(selection);
            populateSecondMajorOptions(selection); // DOUBLE MAJOR: refresh options to exclude the newly-chosen primary
            await renderCombinedGraph();
        }

        // DOUBLE MAJOR: called when the user picks a program from the "Add Major" dropdown.
        // Keeps the primary major and the student's existing completed-course progress intact,
        // and simply expands the graph to include the second program's requirements too.
        async function addSecondMajor(progKey) {
            if (!progKey || progKey === currentSelectionMode) return;
            secondMajorKey = progKey;
            collectActiveIdsForCurrentSelections();
            document.getElementById('removeSecondMajorBtn').style.display = 'inline-flex';
            pendingAutoFitZoom = true; // graph just grew (or shrank) - refit it to the screen
            await renderCombinedGraph();
        }

        // DOUBLE MAJOR: removes the second major and collapses back to a single-major view.
        async function removeSecondMajor() {
            secondMajorKey = null;
            document.getElementById('secondMajorFilter').value = '';
            collectActiveIdsForCurrentSelections();
            pendingAutoFitZoom = true; // graph just shrank back to a single major - refit it
            await renderCombinedGraph();
        }

        // Builds (or rebuilds) the dependency map / node titles / membership sets for
        // whichever major(s) are currently selected, then renders the Mermaid graph.
        // This single function is shared by single-major and double-major flows so the
        // rendering logic never has to be duplicated or drift out of sync.
        async function renderCombinedGraph() {
            const container = document.getElementById('graph-container');

            currentDependencyMap = {};
            currentDependencyTypes = {};
            currentCourseMeta = {};
            courseMajorMembership = {};
            let currentViewNodeTitles = {};

            // Build the course-key list for each active major separately so we can tag
            // membership (primary / secondary / shared-by-both) for the double-major coloring.
            const primaryKeys = flattenRequirementKeys(currentSelectionMode);
            const secondaryKeys = secondMajorKey ? flattenRequirementKeys(secondMajorKey) : [];

            const targetCourseKeys = [];
            const registerMembership = (courseKey, tag) => {
                if (!courseMajorMembership[courseKey]) courseMajorMembership[courseKey] = new Set();
                courseMajorMembership[courseKey].add(tag);
            };

            primaryKeys.forEach(k => { registerMembership(k, 'primary'); if (!targetCourseKeys.includes(k)) targetCourseKeys.push(k); });
            secondaryKeys.forEach(k => { registerMembership(k, 'secondary'); if (!targetCourseKeys.includes(k)) targetCourseKeys.push(k); });

            if (targetCourseKeys.length === 0) {
                container.innerHTML = '<p style="text-align: center; margin-top: 20px; color: #666666;">No courses found for this program.</p>';
                return;
            }

            targetCourseKeys.forEach(courseKey => {
                const courseMeta = cachedData.courses[courseKey];
                if (courseMeta) {
                    currentCourseMeta[courseKey] = courseMeta;
                    currentViewNodeTitles[courseKey] = `${formatCourseLabel(courseKey)}<br/>${courseMeta.name || 'Elective'}`;
                }
            });

            targetCourseKeys.forEach(courseKey => {
                const courseMeta = cachedData.courses[courseKey];
                if (!courseMeta) return;

                if (!currentDependencyMap[courseKey]) currentDependencyMap[courseKey] = [];
                if (!currentDependencyTypes[courseKey]) currentDependencyTypes[courseKey] = {};

                if (courseMeta.prerequisites && Array.isArray(courseMeta.prerequisites)) {
                    courseMeta.prerequisites.forEach(pre => {
                        if (!pre || !pre.id) return;
                        currentDependencyMap[courseKey].push(pre.id);
                        currentDependencyTypes[courseKey][pre.id] = pre.type || 'required';

                        if (!currentViewNodeTitles[pre.id]) {
                            const globalMeta = cachedData.courses[pre.id];
                            const fallbackName = globalMeta ? globalMeta.name : 'Prerequisite Course';
                            currentViewNodeTitles[pre.id] = `${formatCourseLabel(pre.id)}<br/>${fallbackName}`;
                            if (globalMeta) currentCourseMeta[pre.id] = globalMeta;
                        }
                    });
                }
            });

            // Builds a node's display label, folding in the double-major "counts for both" flag.
            function buildNodeLabel(id) {
                const membership = courseMajorMembership[id];
                const isShared = membership && membership.has('primary') && membership.has('secondary');
                return isShared ? `${currentViewNodeTitles[id]}<br/>&#11088; Counts for Both Majors` : currentViewNodeTitles[id];
            }

            // RE-RENDER ENGINE: Wipes and redraws the layout based strictly on data state
            window.triggerReRender = async function() {
                // 1. Calculate which nodes survive the culling process
                const nodesToDraw = Object.keys(currentViewNodeTitles).filter(id => {
                    const isParent = Object.values(currentDependencyMap).some(parents => parents.includes(id));
                    const hasParents = currentDependencyMap[id] && currentDependencyMap[id].length > 0;
                    const isIsolated = !isParent && !hasParents;

                    // If it is isolated AND completed, we physically exclude it from the render string
                    if (isIsolated && completedNodesTracker.has(id)) {
                        return false;
                    }
                    return true;
                });

                if (nodesToDraw.length === 0) {
                    container.innerHTML = '<p style="text-align: center; margin-top: 40px; color: #38a169; font-weight: bold; font-size: 20px;">All program requirements completed!</p>';
                    return;
                }

                // ANTI-CLUTTER: majors with many courses/branches used to render at the same
                // fixed spacing as a 5-course major, producing huge sprawling trees that force
                // heavy scrolling (especially on mobile). Spacing now tightens as node count grows.
                const nodeCount = nodesToDraw.length;
                let rankSpacing = 140, nodeSpacing = 70;
                if (nodeCount > 45) { rankSpacing = 85; nodeSpacing = 34; }
                else if (nodeCount > 25) { rankSpacing = 105; nodeSpacing = 46; }
                else if (nodeCount > 15) { rankSpacing = 120; nodeSpacing = 58; }

                let graphDefinition = `%%{init: {"flowchart": {"rankSpacing": ${rankSpacing}, "nodeSpacing": ${nodeSpacing}}}}%%\ngraph TD;\n`;

                // ALTERNATIVE_DOTTED GROUPING: when a course lists two or more prerequisites
                // tagged "alternative_dotted" (interchangeable "any one of these" options),
                // scattering each as its own arrow across the tree is what makes branching
                // majors so hard to read. Instead, box every alternative_dotted option for a
                // given course together in one dashed cluster, so the "choose one of these"
                // relationship reads as a single visual unit instead of loose stray lines.
                // A course node can only visually live inside one cluster, so if an alternative
                // option is already claimed by an earlier cluster it's left out of this one and
                // simply falls back to a normal (still dashed) edge into this course instead.
                const claimedByCluster = new Set();
                const altClusters = []; // { clusterId, childId, memberIds }
                nodesToDraw.forEach(childId => {
                    const childTypes = currentDependencyTypes[childId] || {};
                    const altIds = (currentDependencyMap[childId] || []).filter(pid =>
                        childTypes[pid] === 'alternative_dotted' &&
                        nodesToDraw.includes(pid) &&
                        !claimedByCluster.has(pid)
                    );
                    if (altIds.length >= 2) {
                        altIds.forEach(pid => claimedByCluster.add(pid));
                        altClusters.push({ clusterId: `altgrp_${sanitizeMermaidId(childId)}`, childId, memberIds: altIds });
                    }
                });
                const clusteredNodeIds = new Set();
                altClusters.forEach(c => c.memberIds.forEach(id => clusteredNodeIds.add(id)));

                // 2. Build the syntax string. Every node/edge id passed to Mermaid goes through
                //    sanitizeMermaidId() first - this is the fix for the crash that used to happen
                //    on courses whose raw key contained spaces/hyphens/etc.

                // 2a. Alternative-option clusters first, so their members render grouped inside
                //     a labeled dashed box rather than scattered among the rest of the tree.
                altClusters.forEach(({ clusterId, childId, memberIds }) => {
                    graphDefinition += `  subgraph ${clusterId}["Alternative to ${formatCourseLabel(childId)} (choose one)"]\n`;
                    memberIds.forEach(id => {
                        graphDefinition += `    ${sanitizeMermaidId(id)}["${buildNodeLabel(id)}"];\n`;
                    });
                    graphDefinition += `  end\n`;
                    graphDefinition += `  class ${clusterId} altClusterStyle;\n`;
                });

                // 2b. Every remaining (non-clustered) node, rendered flat as before.
                nodesToDraw.forEach(id => {
                    if (clusteredNodeIds.has(id)) return; // already emitted above, inside its cluster
                    graphDefinition += `  ${sanitizeMermaidId(id)}["${buildNodeLabel(id)}"];\n`;
                });

                // 2c. Edges. Alternative_dotted prerequisites render as dotted lines (visually
                //     distinct from a true AND-required solid arrow) whether or not they ended
                //     up boxed in a cluster above.
                Object.keys(currentDependencyMap).forEach(id => {
                    if (nodesToDraw.includes(id)) {
                        const types = currentDependencyTypes[id] || {};
                        currentDependencyMap[id].forEach(parentId => {
                            if (nodesToDraw.includes(parentId)) {
                                const arrow = types[parentId] === 'alternative_dotted' ? '-.->' : '-->';
                                graphDefinition += `  ${sanitizeMermaidId(parentId)} ${arrow} ${sanitizeMermaidId(id)};\n`;
                            }
                        });
                    }
                });

                graphDefinition += `\n`;
                nodesToDraw.forEach(id => {
                    graphDefinition += `  click ${sanitizeMermaidId(id)} call mermaidNodeClick("${id}");\n`;
                });

                if (altClusters.length > 0) {
                    graphDefinition += `  classDef altClusterStyle fill:#fffaf0,stroke:#d4a017,stroke-width:2px,stroke-dasharray: 6 3;\n`;
                }

                // 3. Mount to DOM
                try {
                    container.innerHTML = `<div class="mermaid" id="graph-engine">${graphDefinition}</div>`;
                    const element = document.getElementById('graph-engine');
                    await mermaid.run({ nodes: [element] });
                    applyGraphState(); // Restore styling to surviving nodes
                    applyDualMajorHighlighting(); // DOUBLE MAJOR: outline courses shared by both majors
                    // LAYOUT ENGINE: auto-scale a freshly-selected major (or a major/double-major
                    // combo that just changed) to fit the viewport instead of opening oversized -
                    // this is the main fix for large majors requiring constant mobile scrolling.
                    if (pendingAutoFitZoom) {
                        pendingAutoFitZoom = false;
                        autoFitGraphZoomToViewport();
                    }
                } catch (renderError) {
                    console.error("Mermaid Render Error:", renderError);
                    container.innerHTML = '<p style="color: #003366; font-weight: bold; padding: 20px;">Error drawing the dynamic chart. Verify structural constraints.</p>';
                }
            };

            // STATE RESTORATION ENGINE: Restores visual progress after a layout wipe
            function findDomNodeBySafeId(safeId) {
                const nodeElements = Array.from(document.querySelectorAll('.node'));
                return nodeElements.find(n => n.id === `flowchart-${safeId}` || n.id.includes(`flowchart-${safeId}-`));
            }

            function applyGraphState() {
                // Restore node highlights
                completedNodesTracker.forEach(id => {
                    const nodeDom = findDomNodeBySafeId(sanitizeMermaidId(id));
                    if (nodeDom) nodeDom.classList.add('selected-node');
                });

                // Restore pathway lines
                const edges = document.querySelectorAll('.edgePath');
                Object.keys(currentDependencyMap).forEach(childId => {
                    if (completedNodesTracker.has(childId)) {
                        currentDependencyMap[childId].forEach(parentId => {
                            if (completedNodesTracker.has(parentId)) {
                                const safeParent = sanitizeMermaidId(parentId);
                                const safeChild = sanitizeMermaidId(childId);
                                edges.forEach(edge => {
                                    const classes = edge.className.baseVal || edge.className;
                                    if (classes.includes(`ls-${safeParent}`) && classes.includes(`le-${safeChild}`)) {
                                        const pathElement = edge.querySelector('path');
                                        if (pathElement) pathElement.classList.add('selected-edge');
                                    }
                                });
                            }
                        });
                    }
                });

                // Restore "Ready to Take" highlights
                Object.keys(currentDependencyMap).forEach(childId => {
                    const childDomNode = findDomNodeBySafeId(sanitizeMermaidId(childId));
                    if (!childDomNode) return;

                    const parentIds = currentDependencyMap[childId];
                    if (parentIds.length === 0) return;

                    const allParentsHighlighted = parentIds.every(parentId => completedNodesTracker.has(parentId));
                    if (allParentsHighlighted) {
                        childDomNode.classList.add('prereqs-met');
                    }
                });

                updateProgressMetrics();
            }

            // DOUBLE MAJOR: adds a distinguishing outline class to any node that belongs to
            // BOTH the primary and secondary major's requirements, so a student can instantly
            // see which classes give them double credit.
            function applyDualMajorHighlighting() {
                if (!secondMajorKey) return;
                Object.keys(courseMajorMembership).forEach(courseKey => {
                    const membership = courseMajorMembership[courseKey];
                    if (membership.has('primary') && membership.has('secondary')) {
                        const nodeDom = findDomNodeBySafeId(sanitizeMermaidId(courseKey));
                        if (nodeDom) nodeDom.classList.add('dual-major-shared');
                    }
                });
            }

            // Central Click Manager
            window.mermaidNodeClick = function(nodeId, skipRender = false) {
                const isParent = Object.values(currentDependencyMap).some(parents => parents.includes(nodeId));
                const hasParents = currentDependencyMap[nodeId] && currentDependencyMap[nodeId].length > 0;
                const isIsolated = !isParent && !hasParents;

                const willBeActive = !completedNodesTracker.has(nodeId);
                const safeNodeId = sanitizeMermaidId(nodeId);

                // If isolated node clicked: mark complete and trigger structural resize
                if (isIsolated && willBeActive) {
                    completedNodesTracker.add(nodeId);
                    updateProgressMetrics();
                    if (!skipRender && window.triggerReRender) {
                        window.triggerReRender();
                    }
                    return;
                }

                // Standard Node Fast-DOM handling
                const nodeElements = Array.from(document.querySelectorAll('.node'));
                const targetNode = nodeElements.find(n => n.id.includes(safeNodeId));
                if (!targetNode) return;

                function findDomNode(id) { return nodeElements.find(n => n.id.includes(sanitizeMermaidId(id))); }

                if (willBeActive) {
                    function highlightAncestors(id) {
                        const node = findDomNode(id);
                        if (node) node.classList.add('selected-node');
                        completedNodesTracker.add(id);

                        if (currentDependencyMap[id]) {
                            currentDependencyMap[id].forEach(parentId => {
                                highlightAncestors(parentId);
                                const safeParent = sanitizeMermaidId(parentId);
                                const safeId = sanitizeMermaidId(id);
                                const edges = document.querySelectorAll('.edgePath');
                                edges.forEach(edge => {
                                    const classes = edge.className.baseVal || edge.className;
                                    if (classes.includes(`ls-${safeParent}`) && classes.includes(`le-${safeId}`)) {
                                        const pathElement = edge.querySelector('path');
                                        if (pathElement) pathElement.classList.add('selected-edge');
                                    }
                                });
                            });
                        }
                    }
                    highlightAncestors(nodeId);
                } else {
                    targetNode.classList.remove('selected-node');
                    completedNodesTracker.delete(nodeId);

                    if (currentDependencyMap[nodeId]) {
                        currentDependencyMap[nodeId].forEach(parentId => {
                            const safeParent = sanitizeMermaidId(parentId);
                            const edges = document.querySelectorAll('.edgePath');
                            edges.forEach(edge => {
                                const classes = edge.className.baseVal || edge.className;
                                if (classes.includes(`ls-${safeParent}`) && classes.includes(`le-${safeNodeId}`)) {
                                    const pathElement = edge.querySelector('path');
                                    if (pathElement) pathElement.classList.remove('selected-edge');
                                }
                            });
                        });
                    }

                    function unhighlightDescendants(parentId) {
                        Object.keys(currentDependencyMap).forEach(childId => {
                            if (currentDependencyMap[childId].includes(parentId)) {
                                const childNode = findDomNode(childId);
                                if (childNode && childNode.classList.contains('selected-node')) {
                                    childNode.classList.remove('selected-node');
                                    completedNodesTracker.delete(childId);

                                    const safeParent2 = sanitizeMermaidId(parentId);
                                    const safeChild2 = sanitizeMermaidId(childId);
                                    const edges = document.querySelectorAll('.edgePath');
                                    edges.forEach(edge => {
                                        const classes = edge.className.baseVal || edge.className;
                                        if (classes.includes(`ls-${safeParent2}`) && classes.includes(`le-${safeChild2}`)) {
                                            const pathElement = edge.querySelector('path');
                                            if (pathElement) pathElement.classList.remove('selected-edge');
                                        }
                                    });
                                    unhighlightDescendants(childId);
                                }
                            }
                        });
                    }
                    unhighlightDescendants(nodeId);
                }

                Object.keys(currentDependencyMap).forEach(childId => {
                    const childDomNode = findDomNode(childId);
                    if (!childDomNode) return;

                    const parentIds = currentDependencyMap[childId];
                    if (parentIds.length === 0) return;

                    const allParentsHighlighted = parentIds.every(parentId => {
                        const parentDomNode = findDomNode(parentId);
                        return parentDomNode && parentDomNode.classList.contains('selected-node');
                    });

                    if (allParentsHighlighted) {
                        childDomNode.classList.add('prereqs-met');
                    } else {
                        childDomNode.classList.remove('prereqs-met');
                    }
                });

                updateProgressMetrics();
            };

            await window.triggerReRender();
        }

        // Flattens a program's "requirements" object (which mixes plain strings and
        // OR-choice arrays) into one flat list of course keys.
        function flattenRequirementKeys(progKey) {
            if (!progKey || !cachedData.programs[progKey]) return [];
            const segments = cachedData.programs[progKey].requirements || {};
            let keys = [];
            Object.keys(segments).forEach(groupTitle => {
                (segments[groupTitle] || []).forEach(item => {
                    if (Array.isArray(item)) {
                        keys = keys.concat(item);
                    } else if (item) {
                        keys.push(item);
                    }
                });
            });
            return keys;
        }

        // =================================================================
        // FEATURE: COURSE RECOMMENDER
        // =================================================================
        // Suggests 3-5 courses to take next, weighing three factors the user asked for:
        //   1. Prerequisites met - only courses the student is actually eligible for.
        //   2. Time of year - a course that runs in the upcoming or current semester
        //      scores higher (registering during summer counts toward the coming Fall).
        //   3. Scarcity - a course offered only in odd/even years gets a priority boost
        //      when it happens to be offered *this* cycle, since skipping it means
        //      waiting a full extra year for another chance.

        // Determines the current semester bucket and calendar-year parity "right now".
        function getCurrentTermInfo() {
            const now = new Date();
            const month = now.getMonth() + 1; // JS months are 0-indexed
            const year = now.getFullYear();

            let semester;
            if (month >= 1 && month <= 5) semester = 'Spring';
            else if (month >= 6 && month <= 8) semester = 'Summer';
            else semester = 'Fall';

            const parity = (year % 2 === 0) ? 'Even' : 'Odd';
            return { semester, year, parity };
        }

        // Parses one entry of a course's "availability" array, e.g. "Fall Semester(Even)",
        // "Spring Semester", or "Even Years", into a structured {semester, parity} shape.
        function parseAvailabilityEntry(entry) {
            const semesterMatch = entry.match(/(Fall|Spring|Summer)\s*Semester(?:\((Even|Odd)\))?/i);
            if (semesterMatch) {
                return { semester: semesterMatch[1], parity: semesterMatch[2] || null };
            }
            const yearOnlyMatch = entry.match(/(Even|Odd)\s*Years?/i);
            if (yearOnlyMatch) {
                return { semester: null, parity: yearOnlyMatch[1] };
            }
            return { semester: null, parity: null };
        }

        // A course's listed semester is "relevant" right now if it matches the current
        // semester - with one deliberate exception: while planning during Summer, Fall
        // courses are also relevant, since that's exactly when students register for Fall.
        function isSemesterRelevant(courseSemester, currentSemester) {
            if (currentSemester === 'Summer') {
                return courseSemester === 'Fall' || courseSemester === 'Summer';
            }
            return courseSemester === currentSemester;
        }

        // Scores a single course for the recommendation engine.
        // Returns { score, availableNow, isRare } where availableNow means "this course
        // can actually be registered for in the upcoming registration cycle."
        function scoreCourseForRecommendation(meta, term) {
            let score = 0;
            let availableNow = false;
            let isRare = false;
            const availability = meta.availability || [];

            if (availability.length === 0) {
                // No availability data on file - treat as flexible/likely offered,
                // but don't let it outrank courses we have real scheduling data for.
                score += 4;
                availableNow = true;
            }

            availability.forEach(entry => {
                const parsed = parseAvailabilityEntry(entry);
                const semesterOk = parsed.semester ? isSemesterRelevant(parsed.semester, term.semester) : true;
                const parityOk = parsed.parity ? parsed.parity === term.parity : true;

                if (parsed.parity) isRare = true; // only offered every other year = a scarce course

                if (semesterOk && parityOk) {
                    availableNow = true;
                    score += 10; // it actually runs in the upcoming registration window
                    if (parsed.parity) {
                        // SCARCITY PRIORITY: this is a biennial course AND it happens to be
                        // offered this cycle - strongly prioritize it, since missing it means
                        // waiting a full extra year for the next opportunity.
                        score += 15;
                    }
                }
            });

            return { score, availableNow, isRare };
        }

        // Builds the ranked recommendation list from the currently displayed graph.
        function computeRecommendations() {
            const term = getCurrentTermInfo();
            const candidates = [];

            Object.keys(currentCourseMeta).forEach(courseKey => {
                // Skip anything already marked as passed
                if (completedNodesTracker.has(courseKey)) return;
                // Only recommend courses that are part of an actual major requirement,
                // not a raw prerequisite-only placeholder pulled in from elsewhere
                if (!activeGraphNodeIds.includes(courseKey)) return;

                // Prerequisites met check
                const prereqIds = currentDependencyMap[courseKey] || [];
                const prereqsMet = prereqIds.every(pid => completedNodesTracker.has(pid));
                if (!prereqsMet) return;

                const meta = currentCourseMeta[courseKey];
                const { score, availableNow, isRare } = scoreCourseForRecommendation(meta, term);
                if (!availableNow) return; // don't recommend a course that isn't actually offered this cycle

                candidates.push({ courseKey, meta, score, isRare, term });
            });

            candidates.sort((a, b) => b.score - a.score);
            return { list: candidates.slice(0, 5), term };
        }

        function showRecommendationPanel() {
            const { list, term } = computeRecommendations();
            const overlay = document.getElementById('recommendOverlay');
            const subtitle = document.getElementById('recommendSubtitle');
            const resultsList = document.getElementById('recommendResultsList');

            subtitle.textContent = `Based on prerequisites met, and ${term.semester} ${term.year} course availability.`;

            if (list.length === 0) {
                resultsList.innerHTML = '<p style="color:#666; padding: 10px 0;">No eligible courses were found for the current term. Try marking more completed prerequisites, or check back next semester.</p>';
            } else {
                resultsList.innerHTML = list.map(item => {
                    const rareBadge = item.isRare ? '<span class="recommend-badge recommend-badge-rare">Limited Availability</span>' : '';
                    return `
                        <div class="recommend-card">
                            <div class="recommend-card-title">${formatCourseLabel(item.courseKey)}</div>
                            <div class="recommend-card-name">${item.meta.name || 'Elective'}</div>
                            ${rareBadge}
                        </div>
                    `;
                }).join('');
            }

            overlay.style.display = 'flex';
        }

        function hideRecommendationPanel() {
            document.getElementById('recommendOverlay').style.display = 'none';
        }

        // =================================================================
        // LAYOUT ENGINE: Measures the real height of the fixed header + controls panel
        // (which can wrap onto multiple lines on narrow/mobile screens, or when many
        // controls such as search + transcript upload + clear-all are visible at once)
        // and pushes the graph viewport down by exactly that amount, instead of relying
        // on a hardcoded pixel offset that breaks whenever the panel wraps.
        // =================================================================
        function syncAppLayoutOffset() {
            const header = document.querySelector('.hood-header');
            const controls = document.querySelector('.controls-panel');
            const appLayout = document.querySelector('.app-layout');
            if (!header || !controls || !appLayout) return;

            const headerHeight = header.offsetHeight;
            const controlsBottom = controls.getBoundingClientRect().bottom;
            const totalOffset = Math.max(headerHeight, controlsBottom) + 12;

            appLayout.style.paddingTop = `${totalOffset}px`;
            controls.style.top = `${headerHeight + 10}px`;
        }

        window.addEventListener('load', syncAppLayoutOffset);
        window.addEventListener('resize', syncAppLayoutOffset);
        if (window.ResizeObserver) {
            const layoutObserver = new ResizeObserver(syncAppLayoutOffset);
            layoutObserver.observe(document.querySelector('.controls-panel'));
            layoutObserver.observe(document.querySelector('.hood-header'));
        }

        // =================================================================
        // ZOOM ENGINE: Lets users scale large / cluttered dependency trees up or down,
        // independent of the browser's own page zoom, so text stays legible whether
        // a major has 5 courses or 25+.
        // =================================================================
        let currentGraphZoom = 1;
        const ZOOM_MIN = 0.2, ZOOM_MAX = 2.5, ZOOM_STEP = 0.15;

        function applyGraphZoom() {
            const wrapper = document.getElementById('graph-zoom-wrapper');
            if (wrapper) wrapper.style.transform = `scale(${currentGraphZoom})`;
            const label = document.getElementById('zoomLevelLabel');
            if (label) label.textContent = `${Math.round(currentGraphZoom * 100)}%`;
        }

        function resetGraphZoom() {
            currentGraphZoom = 1;
            applyGraphZoom();
        }

        // ANTI-CLUTTER: measures the graph's real rendered size against the visible
        // viewport and scales it down (never up past 100%) so it opens fully in view
        // instead of requiring the student to manually zoom out and scroll around -
        // this is what makes a 60-course major usable on a phone screen.
        function autoFitGraphZoomToViewport() {
            const wrapper = document.getElementById('graph-zoom-wrapper');
            const viewport = document.getElementById('viewport');
            if (!wrapper || !viewport) return;

            wrapper.style.transform = 'scale(1)'; // measure at natural (unscaled) size first
            const naturalWidth = wrapper.scrollWidth;
            const naturalHeight = wrapper.scrollHeight;
            const availableWidth = viewport.clientWidth - 56;
            const availableHeight = viewport.clientHeight - 56;

            if (!naturalWidth || !naturalHeight || availableWidth <= 0 || availableHeight <= 0) {
                applyGraphZoom();
                return;
            }

            const fitScale = Math.min(availableWidth / naturalWidth, availableHeight / naturalHeight, 1);
            currentGraphZoom = Math.max(ZOOM_MIN, +fitScale.toFixed(2));
            applyGraphZoom();
            viewport.scrollTop = 0;
            viewport.scrollLeft = 0;
        }

        document.getElementById('zoomInBtn').addEventListener('click', () => {
            currentGraphZoom = Math.min(ZOOM_MAX, +(currentGraphZoom + ZOOM_STEP).toFixed(2));
            applyGraphZoom();
        });
        document.getElementById('zoomOutBtn').addEventListener('click', () => {
            currentGraphZoom = Math.max(ZOOM_MIN, +(currentGraphZoom - ZOOM_STEP).toFixed(2));
            applyGraphZoom();
        });
        document.getElementById('zoomFitBtn').addEventListener('click', autoFitGraphZoomToViewport);
        document.getElementById('zoomResetBtn').addEventListener('click', resetGraphZoom);

        // ANTI-CLUTTER: click-and-drag panning for large graphs on desktop (touch users
        // already get native scroll-panning). Dragging never starts on top of a clickable
        // course node, so course selection isn't disrupted.
        (function enableDragToPanViewport() {
            const viewport = document.getElementById('viewport');
            if (!viewport) return;
            let isPanning = false;
            let startX = 0, startY = 0, startScrollLeft = 0, startScrollTop = 0;

            viewport.addEventListener('mousedown', (e) => {
                if (e.target.closest('.node')) return; // let course clicks through untouched
                isPanning = true;
                viewport.classList.add('is-panning');
                startX = e.pageX;
                startY = e.pageY;
                startScrollLeft = viewport.scrollLeft;
                startScrollTop = viewport.scrollTop;
            });
            window.addEventListener('mouseup', () => {
                isPanning = false;
                viewport.classList.remove('is-panning');
            });
            window.addEventListener('mousemove', (e) => {
                if (!isPanning) return;
                e.preventDefault();
                viewport.scrollLeft = startScrollLeft - (e.pageX - startX);
                viewport.scrollTop = startScrollTop - (e.pageY - startY);
            });
        })();

        // =================================================================
        // EVENT WIRING
        // =================================================================
        const filterSelect = document.getElementById('categoryFilter');
        filterSelect.addEventListener('change', (e) => {
            updateView(e.target.value);
        });

        document.getElementById('courseSearchBtn').addEventListener('click', handleCourseSearchExecution);
        document.getElementById('courseSearchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleCourseSearchExecution();
        });

        document.getElementById('clearAllBtn').addEventListener('click', handleClearAllSelections);
        document.getElementById('transcriptFileInput').addEventListener('change', handleTranscriptUpload);

        // DOUBLE MAJOR wiring: "+" reveals the second-major picker; choosing an option
        // adds it; "x" removes it again.
        document.getElementById('addMajorBtn').addEventListener('click', () => {
            const wrapper = document.getElementById('secondMajorWrapper');
            wrapper.style.display = wrapper.style.display === 'none' ? 'flex' : 'none';
        });
        document.getElementById('secondMajorFilter').addEventListener('change', (e) => {
            if (e.target.value) {
                addSecondMajor(e.target.value);
            }
        });
        document.getElementById('removeSecondMajorBtn').addEventListener('click', removeSecondMajor);

        // RECOMMENDER wiring
        document.getElementById('recommendBtn').addEventListener('click', showRecommendationPanel);
        document.getElementById('closeRecommendBtn').addEventListener('click', hideRecommendationPanel);
        document.getElementById('recommendOverlay').addEventListener('click', (e) => {
            // Clicking the dimmed backdrop (not the modal itself) closes the panel
            if (e.target.id === 'recommendOverlay') hideRecommendationPanel();
        });

        // =================================================================
        // NEW FEATURE WIRING: DARK MODE & MENU TOGGLE
        // =================================================================
        document.getElementById('darkModeBtn').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('darkModeBtn').textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
        });

        document.getElementById('toggleMenuBtn').addEventListener('click', () => {
            const menu = document.getElementById('collapsibleMenu');
            const btn = document.getElementById('toggleMenuBtn');
            if (menu.style.display === 'none') {
                menu.style.display = 'flex';
                btn.textContent = 'Collapse Menu';
            } else {
                menu.style.display = 'none';
                btn.textContent = 'Expand Menu';
            }
            // Trigger layout recalculation immediately so the graph layout fits perfectly under the controls.
            setTimeout(syncAppLayoutOffset, 50); 
        });

        (async () => {
            await initializeApp();
            updateView('HOME');
        })();

    </script>
</body>
